# Builds index.html from source and deploys to GitHub Pages on every push to main.
# Source of truth is CI (Settings → Pages → Source → "GitHub Actions").
# Actions are SHA-pinned (tag comments for readability) so a tag-hijack can't
# swap the action out from under us; deps come from the committed lockfile via
# `npm ci`; only the built site is uploaded, not the whole workspace.
name: Deploy Leak Lab to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm test
      - run: npm run build # writes the clean _site/ deploy folder (only runtime files)
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
